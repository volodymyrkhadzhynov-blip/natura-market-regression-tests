[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
filterwarnings = ignore::DeprecationWarning
markers =
    regression: Natura Market regression tests (REG-001 to REG-112)
    smoke: Critical path smoke tests (homepage → login → search → category → PDP → cart → checkout)
